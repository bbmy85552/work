        // 光谱图表
        function initSpectrumChart() {
            const chart = echarts.init(document.getElementById('spectrum-chart'));
            const option = {
                tooltip: {
                    trigger: 'axis',
                    formatter: function(params) {
                        return `波数: ${params[0].value[0].toFixed(1)} cm⁻¹<br/>反射率: ${params[0].value[1].toFixed(4)}`;
                    }

                grid: {

                    containLabel: true
                },
                xAxis: {
                    type: 'value',
                    name: '波数 (cm⁻¹)'
                },
                yAxis: {
                    type: 'value',
                    name: '反射率'
                },
                dataZoom: [{

                    start: 0,
                    end: 100

                    type: 'line',
                    smooth: true,
                    data: spectrumData,
                    lineStyle: {
                        width: 2,
                        color: '#5470c6'
                    },
                    areaStyle: {
                        opacity: 0.3,

                            {offset: 1, color: 'rgba(84, 112, 198, 0.1)'}

                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }
